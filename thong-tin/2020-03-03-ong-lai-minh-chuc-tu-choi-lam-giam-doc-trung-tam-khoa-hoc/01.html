<script>
var params = location.href.split('?')[1].split('&');
data = {};
for (x in params){
	data[params[x].split('=')[0]] = params[x].split('=')[1];
}

var gax_media_domain = decodeURIComponent(data["media_path"]);
var gax_width = data["w"]+'px';
var gax_height = data["h"]+'px';
var gax_skip = data["skipAd"];
var gax_flash = data["flash"];
var vaststream=decodeURIComponent(data["tag"]);
var gax_pause=0;
var gax_primary="flash";
if (gax_flash=="false") gax_primary="html";
console.log(gax_primary);

function showPlayer(){
  parent.postMessage({func_type:'abdShowVideoInpagePlayer', param1:gax_width, param2:gax_height},"*");
}

function closePlayer(){
  	parent.postMessage({func_type:'abdCloseVideoInpagePlayer'},"*");
}

var jwp = jwplayer("out_stream_player").setup({
  "file": "video.mp4",
  "height": "100%",
  "width": "100%",
  "autostart": true,
  "muted": true,
  "primary":gax_primary,
  "advertising": {
      "skipoffset" : gax_skip,
      "client": "vast",      
      "tag": vaststream
    },
    "events": {
      onReady: function(e) {
        console.log('onReady');
        jwp.setControls(false);
        
        document.getElementById("btn_mute").addEventListener("click", function(){
            document.getElementById("btn_mute").style.display = "none";
            document.getElementById("btn_unmute").style.display = "block";
            jwp.setVolume(0);
        });
        document.getElementById("btn_unmute").addEventListener("click", function(){
            document.getElementById("btn_mute").style.display = "block";
            document.getElementById("btn_unmute").style.display = "none";
            jwp.setVolume(50);
        });
        
        window.addEventListener('message', function (ev) {
          data=ev.data;
          if (data.func_type=='abdSetVolume')  {
        	  jwp.setVolume(data.param1);
        	  if (data.param1 > 0){
        		  document.getElementById("btn_mute").style.display = "block";
                  document.getElementById("btn_unmute").style.display = "none";        		  
        	  }else{
        		  document.getElementById("btn_mute").style.display = "none";
                  document.getElementById("btn_unmute").style.display = "block";
        	  }
       	  };
          //if (data.func_type=='abdPlay')  {jwp.play(true);gax_pause=0;};
        }, false);
      },
      onAdTime: function(e) {
        timeRemaining = secondsAsTime(e.duration - e.position );
        document.getElementById("txt_message").innerHTML = "Ad finishes in "+timeRemaining+" seconds";
      },
      onAdImpression: function(e) {
        showPlayer();
        jwp.setVolume(0);
        cls = document.getElementsByClassName("jw-skip")[0];
        document.getElementById('btn_skip').appendChild(cls);
        document.getElementsByClassName("jw-icon-inline")[0].appendChild(document.getElementById('icon_skip'));
        console.log('onAdImpression');
      },
      onAdPause: function(e) {
	  /*
        if (gax_pause==1) {
          jwp.play(false);
        }else{
          jwp.play(true);
        }        
		*/
        console.log('onAdPause');
      },
      onAdSkipped: function(e) {
        closePlayer();
        console.log('onSkip');
      },
      onAdComplete: function(e) {
        setTimeout ("closePlayer();",2000);
        
        console.log('onComplete');
      },
      onAdError: function(e) {
        closePlayer();
        console.log('onEror');
      }
    }
});

function secondsAsTime(seconds) {
    var hours = Math.floor(seconds / 3600);
    seconds -= hours * 3600;
    var minutes = Math.floor(seconds / 60);
    seconds = Math.floor(seconds % 60);
    function pad(n) {
        return (n < 10) ? '0'+ n : n;
    }
    if (minutes==0) return pad(seconds);
    else if (minutes>0 && hours==0) return pad(minutes) +':'+ pad(seconds);
    else return pad(hours) +':'+ pad(minutes) +':'+ pad(seconds);
}
</script>
